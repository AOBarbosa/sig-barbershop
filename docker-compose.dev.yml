services:
  db:
    image: mysql:8.0
    container_name: sig_barbershop_db_dev
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-sig_barbershop}
      MYSQL_USER: ${DB_USER:-barbershop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-barbershop}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./api/app/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./api/app/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: sig_barbershop_api_dev
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-sig_barbershop}
      DB_USER: ${DB_USER:-barbershop}
      DB_PASSWORD: ${DB_PASSWORD:-barbershop}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app
    command: sh -c "poetry install --no-root && poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: node:20-alpine
    container_name: sig_barbershop_frontend_dev
    working_dir: /app
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --webpack"

volumes:
  mysql_data_dev:
